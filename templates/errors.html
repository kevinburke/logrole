{{ define "content" }}
<div class="row my-5">
  <div class="col-md-6">
    {{- if .Description }}
    <p>{{ .Description }}</p>
    {{- end }}
  </div>
</div>
<div class="row">
  <div class="col-md-2">
    <p><a title="Go home" href="{{ url "/" }}">Back to the homepage</a></p>
    {{- if .Mailto }}
    <p><a href="mailto:{{ .Mailto.Address }}">Report a problem</a></p>
    {{- end }}
  </div>
</div>
{{ end }}
