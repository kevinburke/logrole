{{- define "paging" }}
  {{- if or .EncryptedPreviousPage .EncryptedNextPage }}
  <div class="row">
    <div class="col-md-2">
      {{- if .EncryptedPreviousPage }}
      <a class="btn btn-info btn-lg btn-previous" href="{{ .Path }}?{{ .PreviousQuery }}">Previous</a>
      {{- end }}
    </div>
    <div class="col-md-2 offset-md-8">
      {{- if .EncryptedNextPage }}
      <a class="btn btn-info btn-lg btn-next" href="{{ .Path }}?{{ .NextQuery }}">Next</a>
      {{- end }}
    </div>
  </div>
  {{- end }}
{{- end }}
