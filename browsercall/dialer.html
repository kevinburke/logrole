<div class="browsercall"
     data-generated-by="logrole/browsercall"
     data-source="{{ .SourceURL }}"
     {{- if .SourceVersion }} data-version="{{ .SourceVersion }}"{{ end }}>
  <p class="browsercall-intro">Place an outbound call from your browser.
    {{- if .From }} Calls show the caller ID <strong>{{ .From }}</strong>.{{ end }}
  </p>
  <div id="browsercall-status" class="browsercall-status" role="status">Initializing&hellip;</div>
  <form id="browsercall-form" class="browsercall-form">
    <label for="browsercall-to">To</label>
    <input type="tel" inputmode="tel" name="to" id="browsercall-to" placeholder="+15557654321" autocomplete="tel" autofocus />
    <div class="browsercall-buttons">
      <button type="button" id="browsercall-call" disabled>Call</button>
      <button type="button" id="browsercall-hangup" disabled>Hang up</button>
    </div>
  </form>
</div>
<script src="{{ .ScriptURL }}"></script>
<script type="text/javascript">
(function() {
  var tokenURL = {{ .TokenPath }};
  var statusEl = document.getElementById('browsercall-status');
  var formEl = document.getElementById('browsercall-form');
  var callBtn = document.getElementById('browsercall-call');
  var hangupBtn = document.getElementById('browsercall-hangup');
  var toInput = document.getElementById('browsercall-to');
  var device = null;
  var activeCall = null;
  var tokenData = null;

  function setStatus(msg, level) {
    statusEl.textContent = msg;
    statusEl.setAttribute('data-level', level || 'info');
  }
  function setBusy(busy) {
    callBtn.disabled = busy;
    hangupBtn.disabled = !busy;
    toInput.disabled = busy;
  }
  function fetchToken() {
    return fetch(tokenURL, {credentials: 'same-origin'}).then(function(r) {
      if (!r.ok) { throw new Error('token request failed: ' + r.status); }
      return r.json();
    });
  }
  function installDeviceHandlers() {
    device.on('error', function(err) {
      setStatus('Device error: ' + (err && err.message || err), 'danger');
      setBusy(false);
    });
    device.on('tokenWillExpire', function() {
      fetchToken().then(function(d) {
        tokenData = d;
        device.updateToken(d.token);
      }).catch(function(err) {
        setStatus('Could not refresh token: ' + err.message, 'danger');
      });
    });
  }
  function ensureDevice() {
    if (device) { return device; }
    if (!tokenData) { throw new Error('access token is not ready yet'); }
    // Construct Twilio.Device inside the click handler. Browsers can block
    // the SDK's AudioContext if the device is created during page load.
    device = new Twilio.Device(tokenData.token, {
      codecPreferences: ['opus', 'pcmu'],
      logLevel: 'warn',
    });
    installDeviceHandlers();
    return device;
  }
  function attachCallHandlers(call) {
    activeCall = call;
    setBusy(true);
    call.on('accept', function() { setStatus('Call connected.', 'success'); });
    call.on('disconnect', function() { activeCall = null; setStatus('Call ended.', 'info'); setBusy(false); });
    call.on('cancel', function() { activeCall = null; setStatus('Call canceled.', 'warning'); setBusy(false); });
    call.on('reject', function() { activeCall = null; setStatus('Call rejected.', 'warning'); setBusy(false); });
    call.on('error', function(err) { setStatus('Call error: ' + (err && err.message || err), 'danger'); setBusy(false); });
  }

  fetchToken()
    .then(function(data) {
      tokenData = data;
      setStatus('Ready (identity ' + data.identity + ').', 'success');
      callBtn.disabled = false;
    })
    .catch(function(err) { setStatus('Could not initialize: ' + err.message, 'danger'); });

  function placeCall() {
    // Ignore activation while the call button is disabled (token not ready,
    // or a call is already in progress). This guards the Enter-key path,
    // since a disabled button never fires its own click event.
    if (callBtn.disabled) { return; }
    var to = toInput.value.trim();
    if (!to) { return; }
    setStatus('Dialing ' + to + '…', 'info');
    setBusy(true);
    var d;
    try {
      d = ensureDevice();
    } catch (err) {
      setStatus('Could not initialize: ' + (err && err.message || err), 'danger');
      setBusy(false);
      return;
    }
    d.connect({params: {To: to}}).then(attachCallHandlers).catch(function(err) {
      setStatus('Could not place call: ' + (err && err.message || err), 'danger');
      setBusy(false);
    });
  }

  callBtn.addEventListener('click', placeCall);
  // Pressing Enter in the To field submits the form; place the call instead
  // of letting the browser navigate.
  formEl.addEventListener('submit', function(e) { e.preventDefault(); placeCall(); });
  hangupBtn.addEventListener('click', function() {
    if (activeCall) { activeCall.disconnect(); }
    else if (device) { device.disconnectAll(); }
  });
})();
</script>
